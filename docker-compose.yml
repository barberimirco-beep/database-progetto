services:

  # ─────────────────────────────────────────────
  # Servizio database MySQL
  # ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: rfid_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - rfid_net

  # ─────────────────────────────────────────────
  # Servizio web: Apache + PHP
  # ─────────────────────────────────────────────
  web:
    image: php:8.2-apache
    container_name: rfid_web
    restart: unless-stopped

    command: >
      sh -c "docker-php-ext-install mysqli && apache2-foreground"

    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    volumes:
      - ./src:/var/www/html

    ports:
      - "${APP_PORT}:80"

    depends_on:
      - db

    networks:
      - rfid_net

# ─────────────────────────────────────────────
# Rete interna
# ─────────────────────────────────────────────
networks:
  rfid_net:
    driver: bridge

# ─────────────────────────────────────────────
# Volume DB
# ─────────────────────────────────────────────
volumes:
  db_data:
