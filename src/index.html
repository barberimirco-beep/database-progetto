<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RFID — Monitor Letture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── CSS Variables ─────────────────────────────────────── */
    :root {
      --bg:          #0a0e14;
      --bg-panel:    #0f1520;
      --bg-row:      #111824;
      --bg-row-alt:  #0d1319;
      --accent:      #00e5a0;
      --accent-dim:  #00a370;
      --accent-glow: rgba(0, 229, 160, 0.15);
      --warn:        #ffb800;
      --text:        #c8d6e5;
      --text-dim:    #5a7a8a;
      --border:      #1e2d3d;
      --mono:        'Share Tech Mono', monospace;
      --sans:        'Exo 2', sans-serif;
      --radius:      6px;
      --transition:  0.25s ease;
    }

    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Scanline overlay for CRT feel ────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── Header ────────────────────────────────────────────── */
    header {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(0,229,160,0.04) 0%, transparent 100%);
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: var(--mono);
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .header-text p {
      font-size: 0.72rem;
      color: var(--text-dim);
      font-family: var(--mono);
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .header-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent);
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    /* ── Main layout ───────────────────────────────────────── */
    main {
      flex: 1;
      padding: 30px 40px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Metric cards ──────────────────────────────────────── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 30px;
    }

    .card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .card:nth-child(2) { animation-delay: 0.07s; }
    .card:nth-child(3) { animation-delay: 0.14s; }
    .card:nth-child(4) { animation-delay: 0.21s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: none; }
    }

    .card-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card-value {
      font-family: var(--mono);
      font-size: 1.9rem;
      color: var(--accent);
      line-height: 1;
    }

    .card-value.warn { color: var(--warn); }

    /* ── Controls bar ──────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .section-title {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      flex: 1;
    }

    .section-title span {
      color: var(--accent);
    }

    button {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 8px 18px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: var(--transition);
      text-transform: uppercase;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #00ffc3;
      box-shadow: 0 0 16px rgba(0,229,160,0.4);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      color: var(--text);
      border-color: var(--accent-dim);
    }

    /* ── Search input ──────────────────────────────────────── */
    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 8px 14px 8px 34px;
      width: 200px;
      outline: none;
      transition: var(--transition);
    }

    .search-wrap input:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-wrap input::placeholder { color: var(--text-dim); }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 0.8rem;
      pointer-events: none;
    }

    /* ── Table ─────────────────────────────────────────────── */
    .table-wrapper {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: rgba(0,229,160,0.05);
      border-bottom: 1px solid var(--border);
    }

    th {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 14px 18px;
      text-align: left;
      font-weight: 400;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    th:hover { color: #fff; }

    th .sort-arrow {
      display: inline-block;
      margin-left: 4px;
      opacity: 0.4;
      font-size: 0.6rem;
    }

    th.active .sort-arrow { opacity: 1; color: var(--accent); }

    tbody tr {
      border-bottom: 1px solid rgba(30, 45, 61, 0.6);
      transition: background var(--transition);
      opacity: 0;
      animation: rowIn 0.35s ease forwards;
    }

    tbody tr:nth-child(even) { background: var(--bg-row-alt); }
    tbody tr:nth-child(odd)  { background: var(--bg-row); }
    tbody tr:hover { background: rgba(0, 229, 160, 0.06); }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: none; }
    }

    td {
      padding: 13px 18px;
      font-size: 0.85rem;
    }

    td.mono { font-family: var(--mono); font-size: 0.78rem; }

    .tag-badge {
      display: inline-block;
      background: var(--accent-glow);
      border: 1px solid rgba(0,229,160,0.25);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 3px 9px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }

    .price-cell {
      font-family: var(--mono);
      color: var(--warn);
    }

    .id-cell {
      font-family: var(--mono);
      color: var(--text-dim);
      font-size: 0.72rem;
    }

    /* ── States ────────────────────────────────────────────── */
    .state-row td {
      text-align: center;
      padding: 40px;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { color: #ff5757; }

    /* ── Footer ────────────────────────────────────────────── */
    footer {
      padding: 16px 40px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    .footer-time { color: var(--accent-dim); }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 700px) {
      header, main, footer { padding-left: 16px; padding-right: 16px; }
      .search-wrap input { width: 140px; }
      td, th { padding: 10px 12px; }
      .card-value { font-size: 1.4rem; }
    }
  </style>
</head>

<body>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header>
    <svg class="logo-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="44" height="44" rx="8" fill="rgba(0,229,160,0.08)"/>
      <rect x="6"  y="12" width="3" height="20" rx="1.5" fill="var(--accent)"/>
      <rect x="11" y="8"  width="2" height="28" rx="1"   fill="var(--accent)" opacity=".7"/>
      <rect x="15" y="12" width="3" height="20" rx="1.5" fill="var(--accent)"/>
      <rect x="20" y="8"  width="2" height="28" rx="1"   fill="var(--accent)" opacity=".5"/>
      <rect x="24" y="12" width="3" height="20" rx="1.5" fill="var(--accent)"/>
      <rect x="29" y="8"  width="2" height="28" rx="1"   fill="var(--accent)" opacity=".7"/>
      <rect x="33" y="12" width="3" height="20" rx="1.5" fill="var(--accent)"/>
      <line x1="6" y1="26" x2="38" y2="26" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="3 2" opacity=".4"/>
    </svg>
    <div class="header-text">
      <h1>RFID — Monitor Letture</h1>
      <p>Sistema di tracciamento prodotti · Interfaccia di controllo</p>
    </div>
    <div class="header-status">
      <div class="pulse"></div>
      <span id="status-text">ONLINE</span>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────────── -->
  <main>

    <!-- Metric cards -->
    <div class="metrics">
      <div class="card">
        <div class="card-label">Letture totali</div>
        <div class="card-value" id="metric-total">—</div>
      </div>
      <div class="card">
        <div class="card-label">Prodotti unici</div>
        <div class="card-value" id="metric-unique">—</div>
      </div>
      <div class="card">
        <div class="card-label">Valore medio (€)</div>
        <div class="card-value" id="metric-avg">—</div>
      </div>
      <div class="card">
        <div class="card-label">Ultima lettura</div>
        <div class="card-value warn" id="metric-last" style="font-size:1rem;padding-top:4px">—</div>
      </div>
    </div>

    <!-- Controls bar -->
    <div class="controls">
      <div class="section-title">Registro letture <span id="count-label"></span></div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" placeholder="Cerca prodotto…" autocomplete="off" />
      </div>
      <button class="btn-secondary" id="btn-export">↓ CSV</button>
      <button class="btn-primary"   id="btn-refresh">⟳ Aggiorna</button>
    </div>

    <!-- Data table -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th data-col="id">        # <span class="sort-arrow">↕</span></th>
            <th data-col="product_id">Tag RFID <span class="sort-arrow">↕</span></th>
            <th data-col="product_name">Prodotto <span class="sort-arrow">↕</span></th>
            <th data-col="price">     Prezzo <span class="sort-arrow">↕</span></th>
            <th data-col="read_at">   Timestamp <span class="sort-arrow">↕</span></th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr class="state-row">
            <td colspan="5"><span class="spinner"></span> Caricamento dati…</td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>

  <!-- ── Footer ─────────────────────────────────────────────── -->
  <footer>
    <span>RFID Tracking System · Progetto Scolastico</span>
    <span class="footer-time" id="footer-time"></span>
  </footer>

  <!-- ── JavaScript ─────────────────────────────────────────── -->
  <script>
    // ── Stato dell'applicazione ──────────────────────────────
    let allData    = [];   // tutti i record dal server
    let sortCol    = 'id'; // colonna attiva per l'ordinamento
    let sortAsc    = false;// direzione ordinamento
    let filterText = '';   // testo di ricerca

    // ── Fetch dati dall'API PHP ──────────────────────────────
    async function loadData() {
      const btn  = document.getElementById('btn-refresh');
      const body = document.getElementById('table-body');
      btn.disabled = true;
      body.innerHTML = `<tr class="state-row"><td colspan="5"><span class="spinner"></span> Caricamento…</td></tr>`;

      try {
        // Aggiunge ?t= per evitare la cache del browser
        const res  = await fetch(`api.php?t=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        if (!json.success) throw new Error(json.error || 'Errore sconosciuto');

        allData = json.data;
        updateMetrics(allData);
        renderTable();
        document.getElementById('status-text').textContent = 'ONLINE';

      } catch (err) {
        body.innerHTML = `<tr class="state-row"><td colspan="5" class="error-msg">⚠ Errore: ${err.message}</td></tr>`;
        document.getElementById('status-text').textContent = 'ERRORE';
        console.error(err);
      } finally {
        btn.disabled = false;
      }
    }

    // ── Calcola e mostra le metriche ─────────────────────────
    function updateMetrics(data) {
      const unique  = new Set(data.map(r => r.product_id)).size;
      const prices  = data.map(r => r.price);
      const avg     = prices.length ? (prices.reduce((a,b) => a + b, 0) / prices.length).toFixed(2) : '—';
      const lastRow = data[0]; // già ordinato DESC dal server

      document.getElementById('metric-total').textContent  = data.length;
      document.getElementById('metric-unique').textContent = unique;
      document.getElementById('metric-avg').textContent    = avg !== '—' ? `€${avg}` : '—';
      document.getElementById('metric-last').textContent   = lastRow ? lastRow.read_at : '—';
    }

    // ── Applica filtro e ordinamento, poi renderizza ─────────
    function renderTable() {
      const body    = document.getElementById('table-body');
      const search  = filterText.toLowerCase();

      let rows = allData.filter(r =>
        r.product_id.toLowerCase().includes(search) ||
        r.product_name.toLowerCase().includes(search)
      );

      // Ordinamento
      rows = rows.sort((a, b) => {
        let va = a[sortCol], vb = b[sortCol];
        if (typeof va === 'number') return sortAsc ? va - vb : vb - va;
        return sortAsc ? String(va).localeCompare(String(vb))
                       : String(vb).localeCompare(String(va));
      });

      document.getElementById('count-label').textContent =
        rows.length !== allData.length ? `(${rows.length} / ${allData.length})` : `(${allData.length})`;

      if (!rows.length) {
        body.innerHTML = `<tr class="state-row"><td colspan="5">Nessun risultato per "${filterText}"</td></tr>`;
        return;
      }

      body.innerHTML = rows.map((r, i) => `
        <tr style="animation-delay:${i * 0.04}s">
          <td class="id-cell">${r.id}</td>
          <td><span class="tag-badge">${escHtml(r.product_id)}</span></td>
          <td>${escHtml(r.product_name)}</td>
          <td class="price-cell">€ ${r.price.toFixed(2)}</td>
          <td class="mono">${escHtml(r.read_at)}</td>
        </tr>
      `).join('');
    }

    // ── Escape XSS basilare ──────────────────────────────────
    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Export CSV ───────────────────────────────────────────
    function exportCSV() {
      const header = ['ID','Tag RFID','Prodotto','Prezzo','Timestamp'];
      const csvRows = [
        header.join(';'),
        ...allData.map(r => [r.id, r.product_id, r.product_name, r.price, r.read_at].join(';'))
      ];
      const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = `rfid_export_${Date.now()}.csv`;
      a.click();
    }

    // ── Event listeners ──────────────────────────────────────
    document.getElementById('btn-refresh').addEventListener('click', loadData);
    document.getElementById('btn-export').addEventListener('click', exportCSV);

    document.getElementById('search').addEventListener('input', e => {
      filterText = e.target.value;
      renderTable();
    });

    // Ordinamento colonne
    document.querySelectorAll('th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (sortCol === col) sortAsc = !sortAsc;
        else { sortCol = col; sortAsc = true; }

        document.querySelectorAll('th').forEach(t => t.classList.remove('active'));
        th.classList.add('active');
        th.querySelector('.sort-arrow').textContent = sortAsc ? '↑' : '↓';
        renderTable();
      });
    });

    // ── Clock nel footer ─────────────────────────────────────
    function updateClock() {
      document.getElementById('footer-time').textContent =
        new Date().toLocaleString('it-IT', { hour12: false });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Auto-refresh ogni 30 secondi ─────────────────────────
    setInterval(loadData, 30000);

    // ── Avvio ────────────────────────────────────────────────
    loadData();
  </script>

</body>
</html>
