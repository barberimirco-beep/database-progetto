<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RFID — Gestione Prodotti</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:         #0a0e14;
      --bg-panel:   #0f1520;
      --bg-row:     #111824;
      --bg-row-alt: #0d1319;
      --accent:     #00e5a0;
      --accent-dim: #00a370;
      --accent-glow:rgba(0,229,160,0.15);
      --warn:       #ffb800;
      --danger:     #ff5c5c;
      --text:       #c8d6e5;
      --text-dim:   #5a7a8a;
      --border:     #1e2d3d;
      --mono:       'Share Tech Mono', monospace;
      --sans:       'Exo 2', sans-serif;
      --radius:     6px;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--text);
      font-family:var(--sans); font-weight:300;
      min-height:100vh; display:flex; flex-direction:column;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
      pointer-events:none; z-index:999;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      display:flex; align-items:center; justify-content:center;
      flex:1; padding:20px;
    }
    .login-box {
      background:var(--bg-panel); border:1px solid var(--border);
      border-radius:10px; padding:40px 36px; width:100%; max-width:380px;
      position:relative; overflow:hidden;
    }
    .login-box::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg,var(--accent),transparent);
    }
    .login-logo {
      font-family:var(--mono); font-size:1rem; color:var(--accent);
      letter-spacing:.14em; text-transform:uppercase; margin-bottom:6px;
    }
    .login-sub {
      font-family:var(--mono); font-size:.65rem; color:var(--text-dim);
      margin-bottom:28px; letter-spacing:.06em;
    }
    .login-field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
    .login-field label {
      font-family:var(--mono); font-size:.62rem; color:var(--text-dim);
      letter-spacing:.1em; text-transform:uppercase;
    }
    .login-field input {
      background:var(--bg); border:1px solid var(--border);
      border-radius:var(--radius); color:var(--text);
      font-family:var(--mono); font-size:.85rem;
      padding:10px 14px; outline:none; transition:.2s; width:100%;
    }
    .login-field input:focus { border-color:var(--accent-dim); box-shadow:0 0 0 3px var(--accent-glow); }
    .login-field input::placeholder { color:var(--text-dim); }
    .btn-login {
      width:100%; margin-top:8px;
      background:var(--accent); color:var(--bg);
      font-family:var(--mono); font-size:.8rem; font-weight:600;
      letter-spacing:.1em; text-transform:uppercase;
      padding:11px; border:none; border-radius:var(--radius);
      cursor:pointer; transition:.2s;
    }
    .btn-login:hover { background:#00ffc3; box-shadow:0 0 20px rgba(0,229,160,.4); }
    .btn-login:disabled { opacity:.4; cursor:not-allowed; }
    .login-error {
      margin-top:12px; font-family:var(--mono); font-size:.72rem;
      color:var(--danger); text-align:center; min-height:18px;
    }
    .login-spinner {
      display:none; width:16px; height:16px;
      border:2px solid rgba(0,0,0,.2); border-top-color:var(--bg);
      border-radius:50%; animation:spin .7s linear infinite;
      vertical-align:middle; margin-right:6px;
    }

    /* ── MAIN APP (hidden until logged in) ── */
    #app { display:none; flex-direction:column; flex:1; }

    header {
      padding:20px 40px; border-bottom:1px solid var(--border);
      background:linear-gradient(180deg,rgba(0,229,160,0.04) 0%,transparent 100%);
      display:flex; align-items:center; gap:16px;
    }
    .header-text h1 { font-family:var(--mono); font-size:1.1rem; color:var(--accent); letter-spacing:.12em; text-transform:uppercase; }
    .header-text p  { font-size:.72rem; color:var(--text-dim); font-family:var(--mono); margin-top:2px; }
    .header-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
    .header-user  { font-family:var(--mono); font-size:.72rem; color:var(--text-dim); }
    .header-user span { color:var(--accent); }
    .header-link, .btn-logout {
      font-family:var(--mono); font-size:.72rem; color:var(--text-dim);
      text-decoration:none; border:1px solid var(--border);
      padding:6px 14px; border-radius:var(--radius); transition:.2s;
      background:transparent; cursor:pointer;
    }
    .header-link:hover, .btn-logout:hover { color:var(--accent); border-color:var(--accent-dim); }
    .btn-logout { color:var(--danger); border-color:rgba(255,92,92,.3); }
    .btn-logout:hover { border-color:var(--danger); background:rgba(255,92,92,.07); }

    main { flex:1; padding:30px 40px; max-width:1100px; width:100%; margin:0 auto; }

    .form-panel {
      background:var(--bg-panel); border:1px solid var(--border);
      border-radius:var(--radius); padding:24px 28px; margin-bottom:28px;
      position:relative; overflow:hidden;
    }
    .form-panel::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg,var(--accent),transparent);
    }
    .form-title { font-family:var(--mono); font-size:.7rem; color:var(--accent); letter-spacing:.14em; text-transform:uppercase; margin-bottom:18px; }
    .form-grid { display:grid; grid-template-columns:1fr 2fr 120px auto; gap:12px; align-items:end; }
    @media(max-width:700px){ .form-grid{ grid-template-columns:1fr; } header,main{ padding-left:16px; padding-right:16px; } }

    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-family:var(--mono); font-size:.62rem; color:var(--text-dim); letter-spacing:.1em; text-transform:uppercase; }
    .field input {
      background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
      color:var(--text); font-family:var(--mono); font-size:.82rem;
      padding:9px 12px; outline:none; transition:.2s; width:100%;
    }
    .field input:focus { border-color:var(--accent-dim); box-shadow:0 0 0 3px var(--accent-glow); }
    .field input::placeholder { color:var(--text-dim); }

    #toast {
      position:fixed; bottom:28px; right:28px; z-index:1000;
      font-family:var(--mono); font-size:.78rem;
      padding:12px 20px; border-radius:var(--radius);
      opacity:0; transform:translateY(10px); transition:opacity .3s,transform .3s; pointer-events:none;
    }
    #toast.show { opacity:1; transform:none; }
    #toast.ok  { background:#0d2e1f; border:1px solid var(--accent); color:var(--accent); }
    #toast.err { background:#2e0d0d; border:1px solid var(--danger); color:var(--danger); }

    button {
      font-family:var(--mono); font-size:.75rem; letter-spacing:.08em;
      padding:9px 20px; border-radius:var(--radius); border:none;
      cursor:pointer; transition:.2s; text-transform:uppercase; white-space:nowrap;
    }
    .btn-add    { background:var(--accent); color:var(--bg); font-weight:600; }
    .btn-add:hover { background:#00ffc3; box-shadow:0 0 16px rgba(0,229,160,.4); }
    .btn-add:disabled { opacity:.4; cursor:not-allowed; }
    .btn-edit   { background:rgba(255,184,0,.1); color:var(--warn); border:1px solid rgba(255,184,0,.3); padding:5px 12px; font-size:.68rem; }
    .btn-edit:hover { background:rgba(255,184,0,.2); }
    .btn-del    { background:rgba(255,92,92,.1); color:var(--danger); border:1px solid rgba(255,92,92,.3); padding:5px 12px; font-size:.68rem; }
    .btn-del:hover  { background:rgba(255,92,92,.2); }
    .btn-save   { background:var(--accent); color:var(--bg); font-weight:600; padding:5px 14px; font-size:.68rem; }
    .btn-cancel { background:transparent; color:var(--text-dim); border:1px solid var(--border); padding:5px 12px; font-size:.68rem; }

    .controls { display:flex; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
    .section-title { font-family:var(--mono); font-size:.75rem; color:var(--text-dim); letter-spacing:.12em; text-transform:uppercase; flex:1; }
    .section-title span { color:var(--accent); }
    .search-wrap { position:relative; }
    .search-wrap input {
      background:var(--bg-panel); border:1px solid var(--border); border-radius:var(--radius);
      color:var(--text); font-family:var(--mono); font-size:.75rem;
      padding:7px 12px 7px 32px; width:200px; outline:none; transition:.2s;
    }
    .search-wrap input:focus { border-color:var(--accent-dim); box-shadow:0 0 0 3px var(--accent-glow); }
    .search-wrap input::placeholder { color:var(--text-dim); }
    .search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:.8rem; pointer-events:none; }

    .table-wrapper { background:var(--bg-panel); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    thead { background:rgba(0,229,160,.05); border-bottom:1px solid var(--border); }
    th { font-family:var(--mono); font-size:.65rem; color:var(--accent); letter-spacing:.14em; text-transform:uppercase; padding:13px 18px; text-align:left; font-weight:400; white-space:nowrap; }
    tbody tr { border-bottom:1px solid rgba(30,45,61,.6); transition:background .2s; }
    tbody tr:nth-child(even) { background:var(--bg-row-alt); }
    tbody tr:nth-child(odd)  { background:var(--bg-row); }
    tbody tr:hover { background:rgba(0,229,160,.05); }
    td { padding:12px 18px; font-size:.85rem; }
    .tag-badge { display:inline-block; background:var(--accent-glow); border:1px solid rgba(0,229,160,.25); color:var(--accent); font-family:var(--mono); font-size:.7rem; padding:3px 9px; border-radius:3px; }
    .price-cell { font-family:var(--mono); color:var(--warn); }
    .actions { display:flex; gap:6px; }
    tr.editing td { background:rgba(0,229,160,.04); }
    tr.editing input { background:var(--bg); border:1px solid var(--accent-dim); border-radius:4px; color:var(--text); font-family:var(--mono); font-size:.8rem; padding:4px 8px; outline:none; width:100%; }
    .state-row td { text-align:center; padding:36px; font-family:var(--mono); font-size:.8rem; color:var(--text-dim); }
    .spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:8px; }
    @keyframes spin { to{ transform:rotate(360deg); } }

    footer { padding:14px 40px; border-top:1px solid var(--border); font-family:var(--mono); font-size:.65rem; color:var(--text-dim); display:flex; justify-content:space-between; }
    .footer-time { color:var(--accent-dim); }
  </style>
</head>
<body>

<!-- ── SCHERMATA LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">⬡ RFID Admin</div>
    <div class="login-sub">Accesso area di gestione prodotti</div>
    <div class="login-field">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="admin" autocomplete="username"/>
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" id="btn-login">
      <span class="login-spinner" id="login-spinner"></span>
      Accedi
    </button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── APP (visibile dopo login) ── -->
<div id="app">
  <header>
    <div class="header-text">
      <h1>⬡ Gestione Prodotti RFID</h1>
      <p>Aggiungi, modifica ed elimina i prodotti associati ai tag</p>
    </div>
    <div class="header-right">
      <span class="header-user">Connesso come <span id="logged-user"></span></span>
      <a class="header-link" href="index.html">← Monitor</a>
      <button class="btn-logout" id="btn-logout">✕ Esci</button>
    </div>
  </header>

  <main>
    <div class="form-panel">
      <div class="form-title">+ Aggiungi nuovo prodotto</div>
      <div class="form-grid">
        <div class="field">
          <label>Tag RFID</label>
          <input type="text" id="new-tag" placeholder="RFID-C30EF02C"/>
        </div>
        <div class="field">
          <label>Nome prodotto</label>
          <input type="text" id="new-name" placeholder="es. Tastiera meccanica"/>
        </div>
        <div class="field">
          <label>Prezzo (€)</label>
          <input type="number" id="new-price" placeholder="0.00" step="0.01" min="0"/>
        </div>
        <button class="btn-add" id="btn-add">+ Aggiungi</button>
      </div>
    </div>

    <div class="controls">
      <div class="section-title">Prodotti registrati <span id="count-label"></span></div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" placeholder="Cerca…"/>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Tag RFID</th>
            <th>Nome prodotto</th>
            <th>Prezzo</th>
            <th>Azioni</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr class="state-row"><td colspan="4"><span class="spinner"></span> Caricamento…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer>
    <span>RFID Tracking System · Gestione Prodotti</span>
    <span class="footer-time" id="footer-time"></span>
  </footer>
</div>

<div id="toast"></div>

<script>
  // ══════════════════════════════════════════════════════════
  //  Autenticazione (lato client, validata dal server)
  // ══════════════════════════════════════════════════════════
  let sessionToken = sessionStorage.getItem('rfid_token');
  let currentUser  = sessionStorage.getItem('rfid_user');

  function showApp(username) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('logged-user').textContent = username;
    loadProducts();
  }

  function showLogin(errMsg = '') {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-error').textContent = errMsg;
    sessionStorage.removeItem('rfid_token');
    sessionStorage.removeItem('rfid_user');
    sessionToken = null;
  }

  // Controlla sessione salvata
  if (sessionToken && currentUser) {
    verifySession().then(ok => ok ? showApp(currentUser) : showLogin());
  }

  async function verifySession() {
    try {
      const r = await fetch('admin_products.php', {
        headers: { 'X-Auth-Token': sessionToken }
      });
      return r.ok;
    } catch { return false; }
  }

  // ── Login ────────────────────────────────────────────────
  async function doLogin() {
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value;
    const btn  = document.getElementById('btn-login');
    const spin = document.getElementById('login-spinner');
    const err  = document.getElementById('login-error');

    if (!user || !pass) { err.textContent = 'Inserisci username e password'; return; }

    btn.disabled = true;
    spin.style.display = 'inline-block';
    err.textContent = '';

    try {
      const r = await fetch('admin_products.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'login', username: user, password: pass })
      });
      const json = await r.json();
      if (json.success && json.token) {
        sessionToken = json.token;
        currentUser  = json.username;
        sessionStorage.setItem('rfid_token', sessionToken);
        sessionStorage.setItem('rfid_user',  currentUser);
        showApp(currentUser);
      } else {
        err.textContent = json.error || 'Credenziali non valide';
        document.getElementById('login-pass').value = '';
      }
    } catch(e) {
      err.textContent = 'Errore di connessione';
    } finally {
      btn.disabled = false;
      spin.style.display = 'none';
    }
  }

  document.getElementById('btn-login').addEventListener('click', doLogin);
  document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('login-user').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-pass').focus(); });

  // ── Logout ───────────────────────────────────────────────
  document.getElementById('btn-logout').addEventListener('click', async () => {
    await fetch('admin_products.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Auth-Token': sessionToken },
      body: JSON.stringify({ action: 'logout' })
    });
    showLogin();
  });

  // ══════════════════════════════════════════════════════════
  //  Gestione prodotti
  // ══════════════════════════════════════════════════════════
  let allProducts = [];
  let filterText  = '';

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function toast(msg, ok = true) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + (ok ? 'ok' : 'err');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
  }

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'X-Auth-Token': sessionToken };
  }

  async function loadProducts() {
    try {
      const r = await fetch(`admin_products.php?action=list&t=${Date.now()}`, {
        headers: { 'X-Auth-Token': sessionToken }
      });
      if (r.status === 401) { showLogin('Sessione scaduta, effettua di nuovo il login'); return; }
      const json = await r.json();
      if (!json.success) throw new Error(json.error);
      allProducts = json.data;
      renderTable();
    } catch(e) {
      document.getElementById('table-body').innerHTML =
        `<tr class="state-row"><td colspan="4" style="color:#ff5757">⚠ ${esc(e.message)}</td></tr>`;
    }
  }

  function renderTable() {
    const body   = document.getElementById('table-body');
    const search = filterText.toLowerCase();
    const rows   = allProducts.filter(p =>
      p.tag_rfid.toLowerCase().includes(search) ||
      p.product_name.toLowerCase().includes(search)
    );
    document.getElementById('count-label').textContent = `(${rows.length})`;
    if (!rows.length) {
      body.innerHTML = `<tr class="state-row"><td colspan="4">Nessun prodotto trovato</td></tr>`;
      return;
    }
    body.innerHTML = rows.map(p => `
      <tr data-tag="${esc(p.tag_rfid)}">
        <td><span class="tag-badge">${esc(p.tag_rfid)}</span></td>
        <td>${esc(p.product_name)}</td>
        <td class="price-cell">€ ${parseFloat(p.price).toFixed(2)}</td>
        <td><div class="actions">
          <button class="btn-edit" onclick="startEdit('${esc(p.tag_rfid)}')">✎ Modifica</button>
          <button class="btn-del"  onclick="deleteProduct('${esc(p.tag_rfid)}','${esc(p.product_name)}')">✕ Elimina</button>
        </div></td>
      </tr>`).join('');
  }

  function startEdit(tag) {
    const p  = allProducts.find(x => x.tag_rfid === tag);
    if (!p) return;
    const tr = document.querySelector(`tr[data-tag="${tag}"]`);
    tr.classList.add('editing');
    tr.innerHTML = `
      <td><span class="tag-badge">${esc(p.tag_rfid)}</span></td>
      <td><input type="text"   id="edit-name"  value="${esc(p.product_name)}"/></td>
      <td><input type="number" id="edit-price" value="${parseFloat(p.price).toFixed(2)}" step="0.01" min="0" style="width:90px"/></td>
      <td><div class="actions">
        <button class="btn-save"   onclick="saveEdit('${esc(tag)}')">✓ Salva</button>
        <button class="btn-cancel" onclick="renderTable()">✕</button>
      </div></td>`;
    document.getElementById('edit-name').focus();
  }

  async function saveEdit(tag) {
    const name  = document.getElementById('edit-name').value.trim();
    const price = parseFloat(document.getElementById('edit-price').value) || 0;
    if (!name) { toast('Il nome non può essere vuoto', false); return; }
    try {
      const r = await fetch('admin_products.php', {
        method: 'PUT',
        headers: authHeaders(),
        body: JSON.stringify({ tag_rfid: tag, product_name: name, price })
      });
      if (r.status === 401) { showLogin('Sessione scaduta'); return; }
      const json = await r.json();
      if (!json.success) throw new Error(json.error);
      toast('Prodotto aggiornato ✓');
      await loadProducts();
    } catch(e) { toast(e.message, false); }
  }

  document.getElementById('btn-add').addEventListener('click', async () => {
    const tag   = document.getElementById('new-tag').value.trim().toUpperCase();
    const name  = document.getElementById('new-name').value.trim();
    const price = parseFloat(document.getElementById('new-price').value) || 0;
    if (!tag || !name) { toast('Tag e nome sono obbligatori', false); return; }
    const btn = document.getElementById('btn-add');
    btn.disabled = true;
    try {
      const r = await fetch('admin_products.php', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ action: 'add', tag_rfid: tag, product_name: name, price })
      });
      if (r.status === 401) { showLogin('Sessione scaduta'); return; }
      const json = await r.json();
      if (!json.success) throw new Error(json.error);
      toast(`"${name}" aggiunto ✓`);
      document.getElementById('new-tag').value = '';
      document.getElementById('new-name').value = '';
      document.getElementById('new-price').value = '';
      await loadProducts();
    } catch(e) { toast(e.message, false); }
    finally { btn.disabled = false; }
  });

  async function deleteProduct(tag, name) {
    if (!confirm(`Eliminare "${name}"?\nI movimenti registrati non verranno cancellati.`)) return;
    try {
      const r = await fetch('admin_products.php', {
        method: 'DELETE',
        headers: authHeaders(),
        body: JSON.stringify({ tag_rfid: tag })
      });
      if (r.status === 401) { showLogin('Sessione scaduta'); return; }
      const json = await r.json();
      if (!json.success) throw new Error(json.error);
      toast('Prodotto eliminato ✓');
      await loadProducts();
    } catch(e) { toast(e.message, false); }
  }

  document.getElementById('search').addEventListener('input', e => {
    filterText = e.target.value;
    renderTable();
  });

  function updateClock() {
    document.getElementById('footer-time').textContent =
      new Date().toLocaleString('it-IT', { hour12: false });
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
